<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Currículum</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>Generador de Currículum </h1>

        <form id="cvForm">
            <input type="text" id="nombre" placeholder="Nombre Completo" required>
            <input type="email" id="correo" placeholder="Correo Electrónico" required>
            <input type="text" id="telefono" placeholder="Teléfono" required>
            <textarea id="perfil" placeholder="Perfil Profesional"></textarea>
            <textarea id="educacion" placeholder="Educación"></textarea>
            <textarea id="experiencia" placeholder="Experiencia Laboral"></textarea>
            <textarea id="habilidades" placeholder="Habilidades"></textarea>

            <button type="button" onclick="generarCV()">Generar Vista Previa</button>
            <button type="button" onclick="descargarPDF()">Descargar PDF</button>
        </form>

        <div id="resultado" class="cv-preview"></div>
    </div>

<script src="script.js"></script>
</body>
</html>
